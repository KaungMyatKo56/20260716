<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <title>キャプション</title>
    <link rel="stylesheet" href="style.css">
    <!-- jQuery本体 -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
  </head>

  <body>
    <header>
      <h1>Japan Food Guide</h1>
    </header>
    
    <main>
      <ul>
        <li>
          <img src="img/new1.jpeg" alt="Ramen is a Japanese noodle soup featuring springy wheat noodles in a deeply flavorful broth topped with braised pork and a soft-boiled egg.">
        </li>
        <li>
          <img src="img/new2.jpeg" alt="Sushi is a delicate Japanese dish featuring seasoned vinegar rice paired with a variety of fresh ingredients—most famously raw seafood—and often wrapped in crisp seaweed.">
        </li>
        <li>
          <img src="img/new3.jpeg" alt="Sashimi is a refined Japanese delicacy consisting of thinly sliced, premium raw seafood or meat served fresh with simple accompaniments like soy sauce, wasabi, and shredded daikon radish.">
        </li>
        <li>
          <img src="img/new4.jpeg" alt="Udon is a comforting Japanese dish featuring thick, chewy wheat noodles served in a light, savory dashi broth and topped with simple ingredients like scallions, tempura, or sweet fried tofu.">
        </li>
        <li>
          <img src="img/new5.jpeg" alt="Karaage is a highly popular Japanese dish of bite-sized chicken marinated in soy sauce, ginger, and garlic, lightly coated in potato starch, and deep-fried to crispy, juicy perfection.">
        </li>
        <li>
          <img src="img/new6.jpeg" alt="Yakitori is a classic Japanese dish of bite-sized chicken pieces skewered and grilled over charcoal, seasoned with either a savory-sweet glaze or simple salt.">
        </li>
      </ul>
    </main>

    <script src="script.js"></script>
